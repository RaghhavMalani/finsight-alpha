# Streamlit theme — black quant terminal.
# This controls Streamlit's *own* widgets (multiselect tags, sliders, buttons,
# selected radio, links) so they stop using the default coral-red and match the
# FinSight palette. Page-level styling lives in src/visualization/theme.py.

[theme]
base = "dark"
primaryColor = "#4c8bf5"            # accent for tags/sliders/buttons (was red)
backgroundColor = "#000000"          # pure black canvas
secondaryBackgroundColor = "#0a0d12" # sidebar + cards (near-black)
textColor = "#e8ecf3"
font = "sans serif"

[client]
toolbarMode = "minimal"

[ui]
hideTopBar = true
