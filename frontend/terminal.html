<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>FinSight — Agent Terminal</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/plotly.js/2.27.0/plotly.min.js"></script>
<style>
/* ============================ tokens ============================ */
:root{
  --bg:#04060b; --bg2:#070b14; --panel:#0a101c; --panel2:#0d1526;
  --line:#182240; --line2:#243459;
  --txt:#e9effc; --dim:#94a4c4; --faint:#5b6a88;
  --pri:#5d8dff; --cyan:#39d0d8; --green:#3ddc97; --red:#ff5d73;
  --violet:#8b7cf7; --blue:#5aa2ff;
  --mono:'JetBrains Mono','SF Mono',Consolas,monospace;
  --sans:'Inter',-apple-system,'Segoe UI',Roboto,sans-serif;
  --r:10px;
}
*{box-sizing:border-box; margin:0; padding:0;}
html,body{height:100%;}
body{
  background:
    radial-gradient(1200px 500px at 70% -10%, rgba(57,208,216,.05), transparent 60%),
    radial-gradient(900px 420px at 10% 110%, rgba(93,141,255,.04), transparent 60%),
    var(--bg);
  color:var(--txt); font-family:var(--sans); font-size:14.5px;
  -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  display:flex; flex-direction:column; overflow:hidden;
}
::-webkit-scrollbar{width:9px;height:9px}
::-webkit-scrollbar-thumb{background:var(--line2);border-radius:8px}
::-webkit-scrollbar-track{background:transparent}
::selection{background:rgba(93,141,255,.25)}

/* ============================ top bar ============================ */
#topbar{
  display:flex; align-items:center; gap:14px; height:46px; flex:0 0 46px;
  padding:0 14px; border-bottom:1px solid var(--line);
  background:linear-gradient(180deg, rgba(18,23,36,.9), rgba(11,14,21,.95));
  backdrop-filter:blur(6px); z-index:30;
}
#brand{font-family:var(--mono); font-weight:700; font-size:15px; letter-spacing:.12em; color:var(--pri); white-space:nowrap;}
#brand span{color:var(--cyan);}
#brand small{color:var(--faint); font-weight:400; letter-spacing:.2em; font-size:9px; display:block; margin-top:-2px;}
#tape{flex:1; overflow:hidden; position:relative; height:100%; display:flex; align-items:center; -webkit-mask-image:linear-gradient(90deg,transparent,#000 4%,#000 96%,transparent); mask-image:linear-gradient(90deg,transparent,#000 4%,#000 96%,transparent);}
#tape-track{display:flex; gap:26px; white-space:nowrap; will-change:transform; animation:tape 45s linear infinite; font-family:var(--mono); font-size:12px;}
#tape:hover #tape-track{animation-play-state:paused}
@keyframes tape{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.tape-item{color:var(--dim); cursor:pointer;} .tape-item b{color:var(--txt); font-weight:600; margin-right:7px;}
.up{color:var(--green)!important}.down{color:var(--red)!important}
#top-right{display:flex; align-items:center; gap:12px; font-family:var(--mono); font-size:11px; color:var(--dim); white-space:nowrap;}
#conn{display:inline-flex; align-items:center; gap:6px;}
#conn i{width:7px;height:7px;border-radius:50%;background:var(--faint);display:inline-block;}
#conn.ok i{background:var(--green); box-shadow:0 0 8px rgba(61,220,151,.7); animation:pulse 2.4s infinite;}
#conn.bad i{background:var(--red);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
.tb-btn{background:none;border:1px solid var(--line);color:var(--dim);font-family:var(--mono);font-size:10.5px;padding:4px 10px;border-radius:6px;cursor:pointer;letter-spacing:.06em;transition:.15s}
.tb-btn:hover{color:var(--pri);border-color:var(--pri)}

/* ============================ stream ============================ */
#stream-wrap{flex:1; overflow-y:auto; scroll-behavior:smooth;}
#stream{max-width:1060px; margin:0 auto; padding:22px 20px 30px; display:flex; flex-direction:column; gap:16px;}

.msg-user{align-self:flex-end; max-width:70%;
  font-family:var(--mono); font-size:13px; color:var(--pri);
  background:rgba(93,141,255,.07); border:1px solid rgba(93,141,255,.25);
  padding:9px 14px; border-radius:12px 12px 3px 12px;}
.msg-note{align-self:center; color:var(--faint); font-size:12px; font-family:var(--mono);}

.card{
  border:1px solid var(--line); border-radius:var(--r); overflow:hidden;
  background:linear-gradient(180deg, var(--panel2), var(--panel));
  animation:rise .28s cubic-bezier(.2,.9,.3,1);
  box-shadow:0 8px 30px rgba(0,0,0,.35);
}
@keyframes rise{from{opacity:0; transform:translateY(10px)}to{opacity:1; transform:none}}
.card-head{display:flex; align-items:center; gap:10px; padding:10px 14px; border-bottom:1px solid var(--line); background:rgba(255,255,255,.015);}
.card-head .tk{font-family:var(--mono); font-weight:700; font-size:14px; color:var(--txt); letter-spacing:.05em;}
.badge{font-family:var(--mono); font-size:9.5px; letter-spacing:.14em; padding:3px 8px; border-radius:5px; border:1px solid;}
.badge.pri{color:var(--pri); border-color:rgba(93,141,255,.45); background:rgba(93,141,255,.08);}
.badge.cyan{color:var(--cyan); border-color:rgba(57,208,216,.45); background:rgba(57,208,216,.07);}
.badge.violet{color:var(--violet); border-color:rgba(139,124,247,.5); background:rgba(139,124,247,.09);}
.badge.green{color:var(--green); border-color:rgba(61,220,151,.45); background:rgba(61,220,151,.07);}
.badge.red{color:var(--red); border-color:rgba(255,93,115,.5); background:rgba(255,93,115,.08);}
.card-head .sub{color:var(--faint); font-size:11px; font-family:var(--mono); margin-left:auto;}
.card-body{padding:18px;}
.card-err{padding:16px; color:var(--red); font-family:var(--mono); font-size:12.5px;}

/* KPIs */
.kpis{display:grid; grid-template-columns:repeat(auto-fit,minmax(118px,1fr)); gap:8px; margin-bottom:12px;}
.kpi{background:rgba(255,255,255,.02); border:1px solid var(--line); border-radius:8px; padding:8px 10px;}
.kpi label{display:block; font-size:10px; letter-spacing:.1em; color:var(--faint); font-family:var(--sans); font-weight:600; text-transform:uppercase; margin-bottom:4px;}
.kpi b{font-family:var(--mono); font-size:17.5px; font-weight:600; color:var(--txt); font-variant-numeric:tabular-nums;}
.kpi b.up{color:var(--green)} .kpi b.down{color:var(--red)}

/* price header inside quote */
.px-head{display:flex; align-items:baseline; gap:14px; margin-bottom:10px; flex-wrap:wrap;}
.px-head .last{font-family:var(--mono); font-size:36px; font-weight:700; font-variant-numeric:tabular-nums;}
.px-head .chg{font-family:var(--mono); font-size:15px; font-weight:600;}
.px-head .nm{color:var(--dim); font-size:12.5px;}
.range-bar{position:relative; height:5px; background:var(--line); border-radius:4px; margin:6px 0 2px;}
.range-bar i{position:absolute; top:-3.5px; width:12px; height:12px; border-radius:50%; background:var(--pri); border:2px solid var(--bg); box-shadow:0 0 8px rgba(93,141,255,.6);}
.range-lbl{display:flex; justify-content:space-between; font-family:var(--mono); font-size:10px; color:var(--faint);}

.chart{width:100%;}
.grid2{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
@media(max-width:840px){.grid2{grid-template-columns:1fr}}

/* tables */
table.tbl{width:100%; border-collapse:collapse; font-family:var(--mono); font-size:12.75px;}
.tbl th{color:var(--faint); font-weight:600; text-align:right; padding:9px 10px; border-bottom:1px solid var(--line); font-size:10.5px; letter-spacing:.08em; text-transform:uppercase; font-family:var(--sans);}
.tbl td{padding:9px 10px; text-align:right; border-bottom:1px solid rgba(28,35,51,.55); color:var(--txt); font-variant-numeric:tabular-nums;}
.tbl th:first-child,.tbl td:first-child{text-align:left;}
.tbl tr:hover td{background:rgba(255,255,255,.02);}

/* chips (continuity) */
.chips{display:flex; flex-wrap:wrap; gap:7px; padding:10px 14px; border-top:1px solid var(--line); background:rgba(255,255,255,.012);}
.chip{font-family:var(--sans); font-weight:500; font-size:12px; color:var(--cyan); background:rgba(57,208,216,.06);
  border:1px solid rgba(57,208,216,.3); border-radius:999px; padding:5px 14px; cursor:pointer; transition:.15s;}
.chip:hover{background:rgba(57,208,216,.16); transform:translateY(-1px);}
.chip.warm{color:var(--pri); border-color:rgba(93,141,255,.35); background:rgba(93,141,255,.05);}
.chip.warm:hover{background:rgba(93,141,255,.14);}

/* inline controls in cards */
.ctl-row{display:flex; gap:8px; flex-wrap:wrap; align-items:end; margin-bottom:12px;}
.ctl{display:flex; flex-direction:column; gap:3px;}
.ctl label{font-size:9px; letter-spacing:.12em; color:var(--faint); font-family:var(--mono); text-transform:uppercase;}
.ctl input,.ctl select{background:var(--bg2); border:1px solid var(--line2); color:var(--txt); font-family:var(--mono); font-size:12px; padding:6px 8px; border-radius:6px; width:96px; outline:none;}
.ctl input:focus,.ctl select:focus{border-color:var(--cyan);}
.btn{background:rgba(93,141,255,.12); color:var(--pri); border:1px solid rgba(93,141,255,.45); font-family:var(--mono); font-size:11.5px; letter-spacing:.06em; padding:7px 16px; border-radius:6px; cursor:pointer; transition:.15s;}
.btn:hover{background:rgba(93,141,255,.22);}

/* agent trace */
.trace{display:flex; flex-direction:column; gap:6px; margin-bottom:12px;}
.trace-step{display:flex; gap:10px; align-items:center; font-family:var(--mono); font-size:11.5px; color:var(--dim);
  border-left:2px solid var(--violet); padding:5px 10px; background:rgba(139,124,247,.05); border-radius:0 6px 6px 0;
  animation:rise .2s ease;}
.trace-step .tool{color:var(--violet); font-weight:600;}
.trace-step .ok{color:var(--green); margin-left:auto;}
.agent-md{line-height:1.75; font-size:14.5px; color:var(--txt); white-space:pre-wrap; word-break:break-word;}
.agent-md code{font-family:var(--mono); background:rgba(255,255,255,.06); padding:1px 5px; border-radius:4px; font-size:12px;}
.agent-md strong{color:var(--pri);}
.thinking{display:inline-flex; gap:4px; align-items:center; color:var(--violet); font-family:var(--mono); font-size:12px;}
.thinking i{width:5px;height:5px;border-radius:50%;background:var(--violet);animation:blink 1.2s infinite;}
.thinking i:nth-child(2){animation-delay:.2s}.thinking i:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,100%{opacity:.2}50%{opacity:1}}

/* welcome */
.hero{text-align:center; padding:34px 20px 10px;}
.hero h1{font-family:var(--mono); font-size:22px; letter-spacing:.14em; color:var(--txt); font-weight:600;}
.hero h1 em{color:var(--pri); font-style:normal;}
.hero p{color:var(--dim); font-size:13px; margin-top:8px; line-height:1.6;}
.hero kbd{font-family:var(--mono); font-size:10.5px; background:var(--panel2); border:1px solid var(--line2); border-bottom-width:2px; padding:2px 6px; border-radius:5px; color:var(--cyan);}
.starters{display:grid; grid-template-columns:repeat(auto-fit,minmax(210px,1fr)); gap:10px; margin-top:20px;}
.starter{border:1px solid var(--line); background:var(--panel); border-radius:var(--r); padding:14px; text-align:left; cursor:pointer; transition:.18s;}
.starter:hover{border-color:var(--cyan); transform:translateY(-2px); box-shadow:0 10px 26px rgba(0,0,0,.4);}
.starter b{font-family:var(--mono); font-size:12px; color:var(--cyan); letter-spacing:.08em; display:block; margin-bottom:5px;}
.starter span{color:var(--dim); font-size:11.5px; line-height:1.5; display:block;}

/* ============================ composer ============================ */
#composer{flex:0 0 auto; border-top:1px solid var(--line); background:linear-gradient(180deg, rgba(11,14,21,.95), rgba(14,18,25,.98)); padding:12px 20px 14px; z-index:20;}
#composer-inner{max-width:1060px; margin:0 auto; position:relative;}
#suggest{position:absolute; bottom:calc(100% + 8px); left:0; right:0; background:var(--panel2); border:1px solid var(--line2); border-radius:10px; display:none; box-shadow:0 -8px 30px rgba(0,0,0,.5); max-height:290px; overflow-y:auto;}
#suggest.open{display:block;}
.sug{display:flex; gap:12px; align-items:baseline; padding:8px 14px; cursor:pointer; font-family:var(--mono); font-size:12.5px;}
.sug:hover,.sug.sel{background:rgba(57,208,216,.08);}
.sug .cmd{color:var(--pri); font-weight:600; min-width:130px;}
.sug .desc{color:var(--dim); font-size:11.5px; font-family:var(--sans);}
#input-row{display:flex; align-items:center; gap:10px; background:var(--bg2); border:1px solid var(--line2); border-radius:12px; padding:4px 6px 4px 16px; transition:border-color .2s, box-shadow .2s;}
#input-row:focus-within{border-color:var(--pri); box-shadow:0 0 0 3px rgba(93,141,255,.08), 0 6px 24px rgba(0,0,0,.35);}
#prompt-sym{font-family:var(--mono); color:var(--pri); font-weight:700; font-size:15px; user-select:none;}
#cmd{flex:1; background:none; border:none; outline:none; color:var(--txt); font-family:var(--mono); font-size:15px; padding:12px 0; caret-color:var(--pri);}
#cmd::placeholder{color:var(--faint);}
#send{background:var(--pri); color:#02060f; border:none; font-family:var(--mono); font-weight:700; font-size:12px; letter-spacing:.08em; padding:9px 18px; border-radius:9px; cursor:pointer; transition:.15s;}
#send:hover{filter:brightness(1.12);}
#send:disabled{opacity:.4; cursor:default;}
#hint{display:flex; justify-content:space-between; margin-top:7px; font-family:var(--mono); font-size:10.5px; color:var(--faint); padding:0 4px;}
#hint b{color:var(--dim); font-weight:500;}
#ctx-chip{color:var(--cyan);}

/* ============================ palette ============================ */
#palette-ov{position:fixed; inset:0; background:rgba(4,6,10,.7); backdrop-filter:blur(3px); display:none; z-index:60; align-items:flex-start; justify-content:center; padding-top:12vh;}
#palette-ov.open{display:flex;}
#palette{width:620px; max-width:92vw; background:var(--panel2); border:1px solid var(--line2); border-radius:14px; overflow:hidden; box-shadow:0 30px 80px rgba(0,0,0,.6); animation:rise .18s ease;}
#pal-in{width:100%; background:none; border:none; outline:none; border-bottom:1px solid var(--line); color:var(--txt); font-family:var(--mono); font-size:15px; padding:15px 18px;}
#pal-list{max-height:340px; overflow-y:auto; padding:6px 0;}

/* ============================ login ============================ */
.login-card{max-width:400px; margin:8vh auto 0; align-self:center; width:100%;}
.login-card .card-body{display:flex; flex-direction:column; gap:10px;}
.login-card input{background:var(--bg2); border:1px solid var(--line2); border-radius:8px; color:var(--txt); font-family:var(--mono); font-size:13px; padding:11px 13px; outline:none;}
.login-card input:focus{border-color:var(--pri);}
.login-err{color:var(--red); font-size:12px; font-family:var(--mono); min-height:15px;}
.login-alt{color:var(--faint); font-size:11.5px; text-align:center; cursor:pointer;}
.login-alt:hover{color:var(--cyan);}

.skeleton{height:120px; border-radius:8px; background:linear-gradient(100deg, var(--panel) 40%, var(--panel2) 50%, var(--panel) 60%); background-size:200% 100%; animation:sk 1.2s infinite linear;}
@keyframes sk{from{background-position:130% 0}to{background-position:-30% 0}}
</style>
<link rel="stylesheet" href="/frontend-assets/finsight-ui.css"/>
<script type="module" src="/frontend-assets/finsight-scene.js"></script>
</head>
<body>

<div id="topbar">
  <div id="brand">FIN<span>SIGHT</span><small>AGENT TERMINAL</small></div>
  <div id="tape"><div id="tape-track"></div></div>
  <div id="top-right">
    <span id="conn"><i></i><span id="conn-txt">BOOT</span></span>
    <span id="clock">--:--:--</span>
    <button class="tb-btn" onclick="location.href='/risk'+(state.lastTicker?'?t='+state.lastTicker:'')">RISK DESK</button>
    <button class="tb-btn" onclick="openPalette()">CTRL·K MODULES</button>
    <button class="tb-btn" id="logout-btn" style="display:none" onclick="doLogout()">EXIT</button>
  </div>
</div>

<div id="stream-wrap"><div id="stream"></div></div>

<div id="composer">
  <div id="composer-inner">
    <div id="suggest"></div>
    <div id="input-row">
      <span id="prompt-sym">›</span>
      <input id="cmd" autocomplete="off" spellcheck="false"
        placeholder="Type a ticker (AAPL), a command (AAPL BT), or ask anything…"/>
      <button id="send" onclick="submitInput()">RUN</button>
    </div>
    <div id="hint">
      <span><b>↑↓</b> history · <b>Tab</b> complete · <b>Ctrl K</b> modules</span>
      <span id="ctx-chip"></span>
    </div>
  </div>
</div>

<div id="palette-ov" onclick="if(event.target===this)closePalette()">
  <div id="palette">
    <input id="pal-in" placeholder="Search modules…"/>
    <div id="pal-list"></div>
  </div>
</div>

<script>
/* =================================================================
   FinSight Agent Terminal — one conversation surface.
   Structured commands hit the FastAPI engine directly and render
   rich cards; natural language streams through /agent/stream.
   ================================================================= */
'use strict';

/* ---------------- utils ---------------- */
const $=s=>document.querySelector(s);
const stream=$('#stream'), streamWrap=$('#stream-wrap'), cmdIn=$('#cmd');
const esc=s=>String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const fN=(v,d=2)=>v==null||!isFinite(v)?'—':Number(v).toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d});
const fP=(v,d=2)=>v==null||!isFinite(v)?'—':(v>=0?'+':'')+(100*v).toFixed(d)+'%';
const fPn=(v,d=2)=>v==null||!isFinite(v)?'—':(100*v).toFixed(d)+'%';
const cls=v=>v==null?'':(v>=0?'up':'down');
const scrollEnd=()=>{streamWrap.scrollTop=streamWrap.scrollHeight;};

const state={authed:false, lastTicker:null, tickers:[], defaults:['AAPL','MSFT','NVDA','SPY'],
  sectors:{}, history:[], hIdx:-1};

/* ---------------- plotly theme ---------------- */
const PLC={displayModeBar:false, responsive:true};
function lay(extra={}){
  return Object.assign({
    paper_bgcolor:'rgba(0,0,0,0)', plot_bgcolor:'rgba(0,0,0,0)',
    font:{family:'JetBrains Mono, monospace', size:10.5, color:'#7d8aa5'},
    margin:{l:48,r:14,t:10,b:32},
    xaxis:{gridcolor:'#161c2b', zeroline:false, linecolor:'#1c2333'},
    yaxis:{gridcolor:'#161c2b', zeroline:false, linecolor:'#1c2333'},
    showlegend:false, hovermode:'x unified',
    hoverlabel:{bgcolor:'#121724', bordercolor:'#273049', font:{family:'JetBrains Mono',size:11,color:'#dbe4f5'}},
  },extra);
}

/* ---------------- api ---------------- */
async function api(path,opts={}){
  const r=await fetch(path,Object.assign({headers:{'Content-Type':'application/json'},credentials:'same-origin'},opts));
  if(r.status===401){state.authed=false; showLogin(); throw new Error('Session expired — sign in above.');}
  const data=await r.json().catch(()=>({detail:'Bad response'}));
  if(!r.ok) throw new Error(typeof data.detail==='string'?data.detail:JSON.stringify(data.detail));
  return data;
}

/* ---------------- stream primitives ---------------- */
function addUserMsg(t){const d=document.createElement('div'); d.className='msg-user'; d.textContent=t; stream.appendChild(d); scrollEnd();}
function addNote(t){const d=document.createElement('div'); d.className='msg-note'; d.textContent=t; stream.appendChild(d); scrollEnd();}

function addCard({title,badge,badgeCls='pri',sub=''}){
  const card=document.createElement('div'); card.className='card';
  card.innerHTML=`<div class="card-head"><span class="tk">${esc(title)}</span>
    <span class="badge ${badgeCls}">${esc(badge)}</span><span class="sub">${esc(sub)}</span></div>
    <div class="card-body"><div class="skeleton"></div></div>`;
  stream.appendChild(card); scrollEnd();
  return {
    el:card,
    body(html){card.querySelector('.card-body').innerHTML=html; scrollEnd(); return card.querySelector('.card-body');},
    fail(err){card.querySelector('.card-body').innerHTML=`<div class="card-err">✕ ${esc(err)}</div>`; scrollEnd();},
    chips(list){ if(!list||!list.length) return;
      const c=document.createElement('div'); c.className='chips';
      list.forEach(({label,cmd,warm})=>{const b=document.createElement('button'); b.className='chip'+(warm?' warm':'');
        b.textContent=label; b.onclick=()=>runInput(cmd); c.appendChild(b);});
      card.appendChild(c); scrollEnd();},
  };
}
function kpi(label,val,valCls=''){return `<div class="kpi"><label>${esc(label)}</label><b class="${valCls}">${val}</b></div>`;}
function plot(div,traces,layout,cfg=PLC){Plotly.newPlot(div,traces,layout,cfg); scrollEnd();}

/* =================================================================
   COMMAND REGISTRY — every module is a command; the palette, the
   autocomplete, and the router all read from this single source.
   ================================================================= */
const COMMANDS=[
  {id:'quote', kw:['des','quote','q'], label:'DES · Security overview', desc:'Price, KPIs, SMA, drawdown, RSI/MACD, distribution', needsTicker:true, run:t=>cardQuote(t)},
  {id:'opt', kw:['opt','options','bs'], label:'OPT · Options pricer', desc:'Black-Scholes vs Binomial vs Monte Carlo + Greeks', needsTicker:false, run:t=>cardOptions(t)},
  {id:'chain', kw:['chain','oc'], label:'CHAIN · Option chain', desc:'Calls & puts with Greeks across strikes and expiries', needsTicker:true, run:t=>cardChain(t)},
  {id:'surf', kw:['surf','vol','surface'], label:'SURF · Vol surface', desc:'3-D implied volatility surface', needsTicker:true, run:t=>cardSurface(t)},

const CMD_INDEX={}; COMMANDS.forEach(c=>c.kw.forEach(k=>CMD_INDEX[k]=c));

/* ---------------- router ---------------- */
function looksLikeTicker(w){return /^[A-Za-z][A-Za-z0-9.\-^]{0,11}$/.test(w);}
function normT(w){return w.toUpperCase();}

function routeInput(raw){
  const txt=raw.trim(); if(!txt) return null;
  const words=txt.split(/\s+/);
  const clean=w=>w.replace(/^\//,'').toLowerCase();

  if(words.length===1){
    const c=CMD_INDEX[clean(words[0])];
    if(c) return {cmd:c, ticker:c.needsTicker?state.lastTicker:null, ok:!c.needsTicker||!!state.lastTicker};
    if(looksLikeTicker(words[0])) return {cmd:CMD_INDEX['des'], ticker:normT(words[0]), ok:true};
    return {agent:txt};
  }
  if(words.length===2){
    const [a,b]=words;
    if(CMD_INDEX[clean(a)]&&looksLikeTicker(b)) return {cmd:CMD_INDEX[clean(a)], ticker:normT(b), ok:true};
    if(CMD_INDEX[clean(b)]&&looksLikeTicker(a)) return {cmd:CMD_INDEX[clean(b)], ticker:normT(a), ok:true};
  }
  return {agent:txt};
}

async function runInput(raw){
  const r=routeInput(raw); if(!r) return;
  addUserMsg(raw.trim());
  state.history.unshift(raw.trim()); state.hIdx=-1;
  if(!state.authed){showLogin(); return;}
  if(r.agent){ await runAgent(r.agent); return; }
  if(!r.ok){ addNote('No security in context — try e.g. "'+r.cmd.kw[0].toUpperCase()+' AAPL"'); return; }
  if(r.ticker){ state.lastTicker=r.ticker; updateCtx(); }
  try{ await r.cmd.run(r.ticker); }catch(e){ addNote('✕ '+e.message); }
}
function submitInput(){const v=cmdIn.value; cmdIn.value=''; closeSuggest(); if(v.trim()) runInput(v);}
function updateCtx(){$('#ctx-chip').textContent=state.lastTicker?('CONTEXT: '+state.lastTicker):'';}

/* =================================================================
   AGENT — natural language → /agent/stream (SSE) with tool trace
   ================================================================= */
async function runAgent(question){
  const c=addCard({title:'AI ANALYST',badge:'AGENT',badgeCls:'violet',sub:state.lastTicker||''});
  const body=c.body(`<div class="trace" id="ag-trace"></div>
    <div class="agent-md" id="ag-ans"></div>
    <div class="thinking" id="ag-think">analyzing <i></i><i></i><i></i></div>`);
  const trace=body.querySelector('#ag-trace'), ans=body.querySelector('#ag-ans'), think=body.querySelector('#ag-think');
  const addStep=(tool,note)=>{const s=document.createElement('div'); s.className='trace-step';
    s.innerHTML=`<span class="tool">› ${esc(tool)}</span><span>${esc(note||'')}</span><span class="ok">✓</span>`;
    trace.appendChild(s); scrollEnd();};
  let text='';
  const mdLite=s=>esc(s).replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/`([^`]+)`/g,'<code>$1</code>');
  try{
    const r=await fetch('/agent/stream',{method:'POST',credentials:'same-origin',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({question, ticker:state.lastTicker, provider:'auto', max_steps:6})});
    if(r.status===401){state.authed=false; c.fail('Session expired — sign in.'); showLogin(); return;}
    if(!r.ok||!r.body) throw new Error('agent unavailable ('+r.status+')');
    const reader=r.body.getReader(), dec=new TextDecoder(); let buf='';
    for(;;){
      const {done,value}=await reader.read(); if(done)break;
      buf+=dec.decode(value,{stream:true});
      let idx;
      while((idx=buf.indexOf('\n\n'))>=0){
        const chunk=buf.slice(0,idx); buf=buf.slice(idx+2);
        const line=chunk.split('\n').find(l=>l.startsWith('data: ')); if(!line)continue;
        let ev; try{ev=JSON.parse(line.slice(6));}catch{continue;}
        if(ev.type==='tool')addStep(ev.tool||ev.name||'tool', ev.input?JSON.stringify(ev.input).slice(0,80):(ev.note||''));
        else if(ev.type==='token'){text+=ev.text||''; ans.innerHTML=mdLite(text); scrollEnd();}
        else if(ev.type==='done'){if(!text&&ev.answer){text=ev.answer; ans.innerHTML=mdLite(text);}
          (ev.steps||[]).forEach(st=>{if(!trace.childElementCount)addStep(st.tool||'tool',st.note||'');});}
      }
    }
    think.remove();
    if(!text) ans.innerHTML='<span style="color:var(--faint)">No answer produced — is an LLM provider configured? (Azure/OpenAI key in .env)</span>';
  }catch(e){ think.remove(); c.fail(e.message); return; }
  c.chips([
    ...(state.lastTicker?[{label:''+state.lastTicker+' overview', cmd:'DES '+state.lastTicker}]:[]),
    {label:'Go deeper', cmd:'Go deeper on that analysis — what would change your view?', warm:true},
  ]);
}

  stream.appendChild(card); scrollEnd();
  let mode='login';
  const err=card.querySelector('#li-err');
  card.querySelector('#li-alt').onclick=()=>{mode=mode==='login'?'register':'login';
    card.querySelector('#li-go').textContent=mode==='login'?'ENTER TERMINAL':'CREATE ACCOUNT';
    card.querySelector('#li-alt').innerHTML=mode==='login'?'No account? <u>Register instead</u>':'Have an account? <u>Sign in</u>';};
  async function go(){
    err.textContent='';
    const email=card.querySelector('#li-e').value.trim(), password=card.querySelector('#li-p').value;
    if(!email||!password){err.textContent='email + password required';return;}
    try{
      await api('/auth/'+mode,{method:'POST',body:JSON.stringify({email,password})});
      if(mode==='register') await api('/auth/login',{method:'POST',body:JSON.stringify({email,password})});
      state.authed=true; card.remove(); loginCardEl=null;
      $('#logout-btn').style.display='';
      addNote('session opened · '+email);
      boot(true);
    }catch(e){err.textContent=e.message;}
  }
  card.querySelector('#li-go').onclick=go;
  card.querySelectorAll('input').forEach(i=>i.addEventListener('keydown',e=>{if(e.key==='Enter')go();}));
}

      <button class="starter" onclick="runInput('REG SPY')"><b>REG SPY ↵</b><span>Hidden Markov regime detection — bull, bear, stress states.</span></button>
      <button class="starter" onclick="runInput('Compare the risk profiles of NVDA and MSFT and tell me which suits a conservative investor')"><b>ASK THE ANALYST ↵</b><span>Plain English → the AI agent calls the platform's tools itself.</span></button>
    </div></div>`;
  stream.appendChild(d);
}

async function loadTape(){
  try{
    const d=await api('/tape?symbols='+encodeURIComponent(state.defaults.slice(0,8).join(',')));
    const items=(d.items||[]);
    if(!items.length)return;
    const html=items.map(i=>`<span class="tape-item" onclick="runInput('${esc(i.ticker)}')"><b>${esc(i.ticker)}</b><span class="${cls(i.change_pct)}">${fN(i.last)} ${fP(i.change_pct)}</span></span>`).join('');
    $('#tape-track').innerHTML=html+html; /* duplicated for seamless loop */
  }catch{/* tape is decorative — never block */}
}

async function boot(after){
  try{
    await api('/auth/me');
    state.authed=true; $('#logout-btn').style.display='';
  }catch(e){ if(!after){welcome();} setConn(true); return; }
  setConn(true);
  try{
    const a=await api('/assets');
    state.tickers=a.all||[]; state.defaults=a.default&&a.default.length?a.default:state.defaults; state.sectors=a.sectors||{};
  }catch{}
  if(!after) welcome();
  loadTape(); setInterval(loadTape,90000);
}
function setConn(ok){const c=$('#conn'); c.className=ok?'ok':'bad'; $('#conn-txt').textContent=ok?'LIVE':'OFFLINE';}

/* clock */
setInterval(()=>{$('#clock').textContent=new Date().toLocaleTimeString('en-GB');},1000);

/* =================================================================
   AUTOCOMPLETE + HISTORY + PALETTE
   ================================================================= */
const sug=$('#suggest'); let sugItems=[], sugSel=-1;
function closeSuggest(){sug.classList.remove('open'); sugSel=-1;}
function renderSuggest(list){
  sugItems=list;
  if(!list.length){closeSuggest();return;}
  sug.innerHTML=list.map((it,i)=>`<div class="sug ${i===sugSel?'sel':''}" data-i="${i}">
    <span class="cmd">${esc(it.fill)}</span><span class="desc">${esc(it.desc)}</span></div>`).join('');
  sug.classList.add('open');
  sug.querySelectorAll('.sug').forEach(el=>el.onclick=()=>{cmdIn.value=sugItems[+el.dataset.i].fill+' '; cmdIn.focus(); closeSuggest();});
}
cmdIn.addEventListener('input',()=>{
  const v=cmdIn.value.trim(); if(!v){closeSuggest();return;}
  const w=v.toLowerCase().split(/\s+/);
  const list=[];
  if(w.length===1){
    COMMANDS.forEach(c=>{if(c.kw.some(k=>k.startsWith(w[0]))) list.push({fill:c.kw[0].toUpperCase(), desc:c.desc});});
    state.tickers.filter(t=>t.toLowerCase().startsWith(w[0])).slice(0,4).forEach(t=>list.push({fill:t, desc:'Security overview'}));
  }else if(w.length===2&&looksLikeTicker(w[0])===false&&CMD_INDEX[w[0].replace(/^\//,'')]){
    state.tickers.filter(t=>t.toLowerCase().startsWith(w[1])).slice(0,6)
      .forEach(t=>list.push({fill:w[0].toUpperCase()+' '+t, desc:CMD_INDEX[w[0].replace(/^\//,'')].desc}));
  }
  renderSuggest(list.slice(0,8));
});
cmdIn.addEventListener('keydown',e=>{
  if(sug.classList.contains('open')){
    if(e.key==='ArrowDown'){e.preventDefault(); sugSel=Math.min(sugSel+1,sugItems.length-1); renderSuggest(sugItems); return;}
    if(e.key==='ArrowUp'&&sugSel>=0){e.preventDefault(); sugSel--; renderSuggest(sugItems); return;}
    if((e.key==='Tab'||(e.key==='Enter'&&sugSel>=0))){e.preventDefault();
      cmdIn.value=sugItems[Math.max(sugSel,0)].fill+' '; closeSuggest(); return;}
    if(e.key==='Escape'){closeSuggest(); return;}
  }
  if(e.key==='Enter'){submitInput();}
  else if(e.key==='ArrowUp'&&!cmdIn.value){state.hIdx=Math.min(state.hIdx+1,state.history.length-1);
    if(state.history[state.hIdx])cmdIn.value=state.history[state.hIdx];}
  else if(e.key==='ArrowDown'&&state.hIdx>=0){state.hIdx--; cmdIn.value=state.hIdx>=0?state.history[state.hIdx]:'';}
});

/* palette */
function openPalette(){$('#palette-ov').classList.add('open'); const i=$('#pal-in'); i.value=''; palRender(''); i.focus();}
function closePalette(){$('#palette-ov').classList.remove('open'); cmdIn.focus();}
function palRender(q){
  const list=COMMANDS.filter(c=>!q||c.label.toLowerCase().includes(q)||c.desc.toLowerCase().includes(q)||c.kw.some(k=>k.includes(q)));
  $('#pal-list').innerHTML=list.map(c=>`<div class="sug" data-id="${c.id}">
    <span class="cmd">${esc(c.label.split(' · ')[0])}</span><span class="desc">${esc(c.desc)}</span></div>`).join('');
  $('#pal-list').querySelectorAll('.sug').forEach(el=>el.onclick=()=>{
    const c=COMMANDS.find(x=>x.id===el.dataset.id); closePalette();
    cmdIn.value=c.kw[0].toUpperCase()+(c.needsTicker?' ':''); cmdIn.focus();
  });
}
$('#pal-in').addEventListener('input',e=>palRender(e.target.value.trim().toLowerCase()));
document.addEventListener('keydown',e=>{
  if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==='k'){e.preventDefault(); openPalette();}
  if(e.key==='Escape'&&$('#palette-ov').classList.contains('open'))closePalette();
  if(e.key==='/'&&document.activeElement!==cmdIn&&document.activeElement!==$('#pal-in')){e.preventDefault(); cmdIn.focus();}
});

/* go */
boot(false);
cmdIn.focus();
</script>
</body>
