<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>FinSight — Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#04060b;--panel:#0a101c;--panel2:#0d1526;--line:#182240;--line2:#243459;
  --txt:#d7e1f5;--dim:#7d8aa5;--faint:#48546f;--pri:#5d8dff;--cyan:#39d0d8;--red:#ff5d73;
  --mono:'JetBrains Mono',Consolas,monospace;--sans:'Inter',system-ui,sans-serif;}
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:var(--sans);color:var(--txt);
  background:
    radial-gradient(1000px 460px at 70% -10%, rgba(57,208,216,.06), transparent 60%),
    radial-gradient(800px 400px at 15% 110%, rgba(93,141,255,.05), transparent 60%),
    var(--bg);}
.box{width:380px;max-width:92vw;border:1px solid var(--line);border-radius:14px;overflow:hidden;
  background:linear-gradient(180deg,var(--panel2),var(--panel));box-shadow:0 30px 80px rgba(0,0,0,.55);
  animation:rise .3s cubic-bezier(.2,.9,.3,1);}
@keyframes rise{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.head{padding:22px 24px 16px;border-bottom:1px solid var(--line);}
.brand{font-family:var(--mono);font-weight:700;font-size:19px;letter-spacing:.12em;color:var(--pri);}
.brand span{color:var(--cyan);}
.head small{display:block;color:var(--faint);font-family:var(--mono);font-size:9.5px;letter-spacing:.24em;margin-top:3px;}
.bd{padding:22px 24px 24px;display:flex;flex-direction:column;gap:11px;}
input{background:#0b0e15;border:1px solid var(--line2);border-radius:8px;color:var(--txt);
  font-family:var(--mono);font-size:13px;padding:12px 14px;outline:none;transition:.15s;}
input:focus{border-color:var(--pri);box-shadow:0 0 0 3px rgba(93,141,255,.08);}
button{background:var(--pri);color:#02060f;border:none;border-radius:9px;font-family:var(--mono);
  font-weight:700;font-size:12.5px;letter-spacing:.1em;padding:13px;cursor:pointer;transition:.15s;}
button:hover{filter:brightness(1.1)}
.err{color:var(--red);font-family:var(--mono);font-size:11.5px;min-height:15px;}
.alt{color:var(--faint);font-size:12px;text-align:center;cursor:pointer;}
.alt u{color:var(--cyan);text-decoration:none;}
.alt:hover u{text-decoration:underline;}
</style>
<link rel="stylesheet" href="/frontend-assets/finsight-ui.css"/>
<script type="module" src="/frontend-assets/finsight-scene.js"></script>
</head>
<body>
<div class="box">
  <div class="head"><div class="brand">FIN<span>SIGHT</span></div><small>AGENT TERMINAL · SECURE ACCESS</small></div>
  <div class="bd">
    <input id="e" type="email" placeholder="email" autocomplete="username"/>
    <input id="p" type="password" placeholder="password" autocomplete="current-password"/>
    <div class="err" id="err"></div>
    <button id="go">ENTER TERMINAL</button>
    <div class="alt" id="alt">No account? <u>Register instead</u></div>
  </div>
</div>
<script>
'use strict';
let mode='login';
const $=id=>document.getElementById(id);
$('alt').onclick=()=>{mode=mode==='login'?'register':'login';
  $('go').textContent=mode==='login'?'ENTER TERMINAL':'CREATE ACCOUNT';
  $('alt').innerHTML=mode==='login'?'No account? <u>Register instead</u>':'Have an account? <u>Sign in</u>';};
async function go(){
  $('err').textContent='';
  const email=$('e').value.trim(), password=$('p').value;
  if(!email||!password){$('err').textContent='email + password required';return;}
  try{
    let r=await fetch('/auth/'+mode,{method:'POST',headers:{'Content-Type':'application/json'},
      credentials:'same-origin',body:JSON.stringify({email,password})});
    let d=await r.json().catch(()=>({}));
    if(!r.ok)throw new Error(typeof d.detail==='string'?d.detail:'failed');
    if(mode==='register'){
      r=await fetch('/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},
        credentials:'same-origin',body:JSON.stringify({email,password})});
      if(!r.ok)throw new Error('registered — now sign in');
    }
    location.href='/terminal';
  }catch(e){$('err').textContent=e.message;}
}
$('go').onclick=go;
document.querySelectorAll('input').forEach(i=>i.addEventListener('keydown',e=>{if(e.key==='Enter')go();}));
fetch('/auth/me',{credentials:'same-origin'}).then(r=>{if(r.ok)location.href='/terminal';}).catch(()=>{});
</script>
</body>
</html>
