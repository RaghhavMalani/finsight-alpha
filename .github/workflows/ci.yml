name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      APP_ENV: test
      FINSIGHT_DATA_DIR: ${{ runner.temp }}/finsight-data
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e . pytest httpx
      - run: python -m compileall -q backend src tests
      - run: pytest -q

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend-v2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend-v2/package-lock.json
      - run: npm ci
      - run: npx eslint src/components/terminal/ALTPanel.tsx
      - run: npx tsc --noEmit
      - run: npm run build

  truth-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Reject removed alternative-data theatre
        shell: bash
        run: |
          ! git grep -nE 'parking-lot fill|BACKTESTED ·|Since 2018.*median forward return|fall back silently to sim' -- frontend-v2/src
